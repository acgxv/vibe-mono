# Monorepo workspace tasks.

# Check
# | task             | type      | cwd |
# | ---------------- | --------- | --- |
# | check            | composite |     |
# | check-rust       | command   |     |
# | check-typescript | command   |     |

[tasks.check]
clear = true
workspace = false
dependencies = [
	"check-rust",
	"check-typescript",
	"fmt-check",
	"lint",
	"test",
]

[tasks.check-rust]
workspace = false
command = "cargo"
args = [
	"check",
	"--all-features",
	"--all-targets",
	"--workspace",
]

[tasks.check-typescript]
workspace = false
command = "node"
args = [
	"node_modules/typescript/bin/tsc",
	"--noEmit",
	"--project",
	"tsconfig.json",
]

# Format
# | task                 | type      | cwd |
# | -------------------- | --------- | --- |
# | fmt                  | composite |     |
# | fmt-check            | composite |     |
# | fmt-rust             | command   |     |
# | fmt-rust-check       | command   |     |
# | fmt-toml             | command   |     |
# | fmt-toml-check       | command   |     |
# | fmt-typescript       | command   |     |
# | fmt-typescript-check | command   |     |

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-toml",
	"fmt-typescript",
]

[tasks.fmt-check]
workspace = false
dependencies = [
	"fmt-rust-check",
	"fmt-toml-check",
	"fmt-typescript-check",
]

[tasks.fmt-rust]
workspace = false
command = "rustup"
args = [
	"run",
	"nightly",
	"cargo",
	"fmt",
	"--all",
]

[tasks.fmt-rust-check]
workspace = false
command = "rustup"
args = [
	"run",
	"nightly",
	"cargo",
	"fmt",
	"--all",
	"--",
	"--check",
]

[tasks.fmt-toml]
workspace = false
command = "taplo"
args = [
	"fmt",
]

[tasks.fmt-toml-check]
workspace = false
command = "taplo"
args = [
	"fmt",
	"--check",
]

[tasks.fmt-typescript]
workspace = false
command = "node"
args = [
	"node_modules/oxfmt/bin/oxfmt",
	"scripts",
	"package.json",
	"tsconfig.json",
	".oxfmtrc.json",
	".oxlintrc.json",
]

[tasks.fmt-typescript-check]
workspace = false
command = "node"
args = [
	"node_modules/oxfmt/bin/oxfmt",
	"--check",
	"scripts",
	"package.json",
	"tsconfig.json",
	".oxfmtrc.json",
	".oxlintrc.json",
]

# Lint
# | task                  | type      | cwd |
# | --------------------- | --------- | --- |
# | lint                  | composite |     |
# | lint-fix              | composite |     |
# | lint-fix-rust         | command   |     |
# | lint-fix-typescript   | command   |     |
# | lint-fix-vstyle       | composite |     |
# | lint-fix-vstyle-rust  | command   |     |
# | lint-rust             | command   |     |
# | lint-typescript       | command   |     |
# | lint-vstyle           | composite |     |
# | lint-vstyle-rust      | command   |     |

[tasks.lint]
workspace = false
dependencies = [
	"lint-rust",
	"lint-typescript",
	"lint-vstyle",
]

[tasks.lint-fix]
workspace = false
dependencies = [
	"lint-fix-rust",
	"lint-fix-typescript",
	"lint-fix-vstyle",
]

[tasks.lint-fix-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--fix",
	"--allow-dirty",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-fix-typescript]
workspace = false
command = "node"
args = [
	"node_modules/oxlint/bin/oxlint",
	"--fix",
	"scripts",
]

[tasks.lint-fix-vstyle]
workspace = false
dependencies = [
	"lint-fix-vstyle-rust",
]

[tasks.lint-fix-vstyle-rust]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"tune",
	"--language",
	"rust",
	"--workspace",
	"--all-features",
	"--strict",
]

[tasks.lint-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-typescript]
workspace = false
command = "node"
args = [
	"node_modules/oxlint/bin/oxlint",
	"scripts",
]

[tasks.lint-vstyle]
workspace = false
dependencies = [
	"lint-vstyle-rust",
]

[tasks.lint-vstyle-rust]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"curate",
	"--language",
	"rust",
	"--workspace",
	"--all-features",
	"--strict",
]

# List
# | task                  | type    | cwd |
# | --------------------- | ------- | --- |
# | list-template-markers | command |     |

[tasks.list-template-markers]
workspace = false
command = "node"
args = [
	"scripts/list-template-markers.ts",
]

# Test
# | task            | type      | cwd |
# | --------------- | --------- | --- |
# | test            | composite |     |
# | test-rust       | command   |     |
# | test-typescript | command   |     |

[tasks.test]
clear = true
workspace = false
dependencies = [
	"test-rust",
	"test-typescript",
]

[tasks.test-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.test-typescript]
workspace = false
command = "node"
args = [
	"--test",
]
